{% extends "base.html" %} {% block content %}

<div class="w-full max-w-md">
  <div class="bg-white shadow-xl rounded-2xl p-8 border border-gray-100">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-semibold text-gray-800">Welcome Back</h2>
      <p class="text-sm text-gray-500 mt-2">
        Sign in to continue to your dashboard
      </p>
    </div>

    <form method="post" action="/login" class="space-y-5">
      <div>
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
        <label
          for="username"
          class="block text-sm font-medium text-gray-600 mb-1"
        >
          Username
        </label>
        <input
          name="username"
          autofocus
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
          placeholder="Enter your username"
        />
      </div>

      <div>
        <label
          for="password"
          class="block text-sm font-medium text-gray-600 mb-1"
        >
          Password
        </label>
        <input
          name="password"
          type="password"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
          placeholder="Enter your password"
        />
      </div>

      {% if flash %}
      <div
        class="rounded-xl p-5 mb-4 shadow {% if flash.type == 'success' %} bg-green-50 border border-green-200 text-green-700 {% else %} bg-red-50 border border-red-200 text-red-700 {% endif %}"
      >
        <div class="flex justify-between items-center">
          <span class="font-medium">{{ flash.msg }}</span>
          <button
            onclick="this.parentElement.parentElement.remove()"
            class="text-sm opacity-61 hover:opacity-100"
          >
            ✕
          </button>
        </div>
      </div>
      {% endif %}

      <button
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition duration-200 shadow-sm"
      >
        Login
      </button>
    </form>

    <div class="text-center mt-6">
      <p class="text-sm text-gray-600">
        Don't have an account?
        <a href="/register" class="text-blue-600 hover:underline font-medium">
          Register
        </a>
      </p>
    </div>
  </div>
</div>

{% endblock %}
