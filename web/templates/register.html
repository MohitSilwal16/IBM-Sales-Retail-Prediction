{% extends "base.html" %} {% block content %}

<div class="w-full max-w-md">
  <div class="bg-white shadow-xl rounded-2xl p-8 border border-gray-100">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-semibold text-gray-800">Create Account</h2>
      <p class="text-sm text-gray-500 mt-2">Register to get started</p>
    </div>

    <form method="post" action="/register" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">
          Username
        </label>
        <input
          name="username"
          autofocus
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
          placeholder="Choose a username"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">
          Password
        </label>
        <input
          name="password"
          type="password"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
          placeholder="Create a password"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition duration-200 shadow-sm"
      >
        Register
      </button>
    </form>

    <div class="text-center mt-6">
      <p class="text-sm text-gray-600">
        Already have an account?
        <a href="/login" class="text-blue-600 hover:underline font-medium">
          Login
        </a>
      </p>
    </div>
  </div>
</div>

{% endblock %}
