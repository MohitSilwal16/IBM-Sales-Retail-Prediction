{% extends "base.html" %} {% block content %}
<div class="w-full max-w-[1600px] mx-auto my-4 lg:my-8 px-4 lg:px-6">
  <div class="flex flex-col lg:flex-row gap-6 min-h-[calc(100vh-4rem)]">
    <!-- Left Sidebar – always visible, stacks on mobile -->
    <aside
      class="lg:w-72 w-full bg-white rounded-2xl shadow-xl p-6 flex flex-col justify-between"
    >
      <div>
        <h2 class="text-2xl font-bold text-gray-800 mb-8">Retail Sales</h2>
        <nav class="space-y-2">
          {% set active_page = active_page|default('files') %}
          <a
            href="/"
            class="block px-4 py-3 rounded-xl {% if active_page == 'files' %}bg-blue-100 text-blue-700 font-semibold{% else %}text-gray-700 hover:bg-gray-100{% endif %} transition"
          >
            📁 Files
          </a>
          <a
            href="/predict"
            class="block px-4 py-3 rounded-xl {% if active_page == 'predict' %}bg-blue-100 text-blue-700 font-semibold{% else %}text-gray-700 hover:bg-gray-100{% endif %} transition"
          >
            🔮 Predict
          </a>
          <a
            href="/analytics"
            class="block px-4 py-3 rounded-xl {% if active_page == 'analytics' %}bg-blue-100 text-blue-700 font-semibold{% else %}text-gray-700 hover:bg-gray-100{% endif %} transition"
          >
            📊 Analytics
          </a>
        </nav>
      </div>
      <div class="mt-8 pt-6 border-t border-gray-200">
        <p class="text-sm text-gray-500 mb-1">Logged in as</p>
        <p class="font-medium text-gray-800 mb-4">{{ user }}</p>
        <a
          href="/logout"
          class="block w-full text-center bg-red-500 hover:bg-red-600 text-white py-2.5 rounded-xl font-medium transition shadow-sm"
        >
          Logout
        </a>
      </div>
    </aside>

    <!-- Main Content Area – takes remaining space -->
    <main
      class="flex-1 bg-white rounded-2xl shadow-xl p-6 lg:p-8 overflow-hidden"
    >
      {% block dashboard_content %}{% endblock %}
    </main>
  </div>
</div>
{% endblock %}
