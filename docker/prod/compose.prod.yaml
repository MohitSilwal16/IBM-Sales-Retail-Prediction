services:
  web:
    network_mode: host
    build:
      context: ../..
      dockerfile: docker/prod/Dockerfile.prod
    ports:
      - "8000:8000"
    env_file:
      - ../../env/prod.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock 
      - /tmp:/tmp 
      - ../../web/ml:/usr/src/app/ml
