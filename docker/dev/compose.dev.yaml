services:
  web:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile.dev
    ports:
      - "8000:8000"
    env_file:
      - ../../env/dev.env
    volumes:
      - ../../tmp/sqlite:/web/data
    develop:
      watch:
        - action: sync
          path: ../../web
          target: /web/web
        - action: rebuild
          path: ../../web/requirements.txt
          
  ml:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile.dev
    command: uvicorn ml.inference_server:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    develop:
      watch:
        - action: sync
          path: ../../ml
          target: /web/ml
        - action: rebuild
          path: ../../ml/requirements.txt

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console UI
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    command: server /data --console-address ":9001"
    volumes:
      - ../../tmp/minio:/data
